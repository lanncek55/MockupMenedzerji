<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic Life - Mobilno</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #e2e8f0; /* Gray bg for desktop to contrast the phone */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* The Phone Mockup Container */
        .phone-mockup {
            width: 375px;
            height: 812px;
            background-color: #f0fdf4;
            border-radius: 40px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 12px solid #1f2937; /* Dark gray "bezels" */
        }

        /* iPhone Notch Mockup */
        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 25px;
            background-color: #1f2937;
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
            z-index: 50;
        }

        /* Inner content area */
        .phone-content {
            height: 100%;
            overflow-y: auto;
            scrollbar-width: none; /* Firefox */
        }
        .phone-content::-webkit-scrollbar {
            display: none; /* Chrome */
        }

        /* Bottom Navigation safe area */
        .bottom-nav-safe {
            padding-bottom: 20px;
        }

        @media (max-width: 400px) {
            body {
                background-color: #f0fdf4;
                display: block;
            }
            .phone-mockup {
                width: 100%;
                height: 100vh;
                border-radius: 0;
                border: none;
                box-shadow: none;
            }
            .notch { display: none; }
        }
    </style>
</head>
<body>
    <div class="phone-mockup">
        <div class="notch"></div>

        <div class="phone-content relative bg-[#f0fdf4] pb-24">

            <!-- Status Bar Placeholder -->
            <div class="h-10 px-6 flex justify-between items-end pb-1 text-xs font-medium z-40 relative text-white">
                <span>9:41</span>
                <div class="flex space-x-1 items-center">
                    <i class="fas fa-signal text-[10px]"></i>
                    <i class="fas fa-wifi text-[10px]"></i>
                    <i class="fas fa-battery-full text-sm"></i>
                </div>
            </div>

            <!-- Main Content -->

<div class="h-full w-full bg-[#114232] absolute top-0 left-0 flex flex-col justify-between pt-20 pb-12 px-8">
    <div class="flex-1 flex flex-col items-center justify-center space-y-12">

        <div class="text-center text-white">
            <h1 class="text-2xl font-bold tracking-widest mb-2">FUTURISTIC LIFE</h1>
            <p class="text-sm font-light opacity-80 px-4">Prenovljeni Zdravstveni Portal (Center za kvaliteto življenja)</p>
        </div>

        <div class="w-48 h-48 bg-white rounded-full flex items-center justify-center shadow-[0_0_40px_rgba(255,255,255,0.2)] p-2">
            <!-- Simulated Logo from image -->
            <div class="w-full h-full rounded-full border border-gray-100 flex items-center justify-center p-4">
                <i class="fas fa-dna text-6xl text-[#114232]"></i>
            </div>
        </div>

    </div>

    <div class="w-full space-y-4">
        <a href="domov.html" class="block w-full bg-white text-[#114232] text-center py-4 rounded-full font-bold shadow-lg">Naroči se na pregled</a>
        <a href="domov.html" class="block w-full bg-[#8eb79e] bg-opacity-30 border border-[#8eb79e] text-white text-center py-4 rounded-full font-bold">Prijava</a>
        <div class="text-center mt-6">
            <a href="#" class="text-white text-sm opacity-80 underline hover:opacity-100">Spoznaj Futuristic Life</a>
        </div>
    </div>
</div>


        </div>


    </div>
</body>
</html>
