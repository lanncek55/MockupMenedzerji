<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #e2e8f0; /* Gray bg for desktop to contrast the phone */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* The Phone Mockup Container */
        .phone-mockup {
            width: 375px;
            height: 812px;
            background-color: #f0fdf4;
            border-radius: 40px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 12px solid #1f2937; /* Dark gray "bezels" */
        }

        /* iPhone Notch Mockup */
        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 25px;
            background-color: #1f2937;
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
            z-index: 50;
        }

        /* Inner content area */
        .phone-content {
            height: 100%;
            overflow-y: auto;
            scrollbar-width: none; /* Firefox */
        }
        .phone-content::-webkit-scrollbar {
            display: none; /* Chrome */
        }

        /* Bottom Navigation safe area */
        .bottom-nav-safe {
            padding-bottom: 20px;
        }

        @media (max-width: 400px) {
            body {
                background-color: #f0fdf4;
                display: block;
            }
            .phone-mockup {
                width: 100%;
                height: 100vh;
                border-radius: 0;
                border: none;
                box-shadow: none;
            }
            .notch { display: none; }
        }
    </style>
</head>
<body>
