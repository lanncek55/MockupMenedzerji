<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic Life - Mobilno</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6; /* gray-100 */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        /* Mobile Device Simulation */
        .device-simulator {
            width: 390px; /* iPhone 12/13/14 width */
            height: 844px; /* iPhone 12/13/14 height */
            background-color: #f0fdf4; /* App bg color */
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            position: relative;
            border: 12px solid #1f2937; /* Dark gray border for phone frame */
            display: flex;
            flex-direction: column;
        }

        /* Safe area notch simulation */
        .device-simulator::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 25px;
            background-color: #1f2937;
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
            z-index: 50;
        }

        /* Scrollable content area */
        .app-content {
            flex: 1;
            overflow-y: auto;
            padding-top: 35px; /* Space for notch */
            padding-bottom: 70px; /* Space for bottom nav */
            scrollbar-width: none; /* Firefox */
        }
        .app-content::-webkit-scrollbar {
            display: none; /* Chrome, Safari, Edge */
        }
    </style>
</head>
<body>
    <div class="device-simulator">
        <!-- Top Status Bar (Fake) -->
        <div class="absolute top-0 w-full h-8 flex justify-between items-end px-6 pb-1 text-xs font-semibold z-40 text-gray-800">
            <span>9:41</span>
            <div class="flex space-x-1 items-center mb-0.5">
                <i class="fas fa-signal text-[10px]"></i>
                <i class="fas fa-wifi text-[10px]"></i>
                <i class="fas fa-battery-full text-[12px]"></i>
            </div>
        </div>

        <div class="app-content">

    <!-- Header -->
    <header class="bg-[#114232] text-white p-4 pb-6 rounded-b-3xl mb-4 pt-10">
        <div class="flex justify-between items-center mb-4">
            <div class="flex items-center justify-center">
                <img src="logo.svg" alt="Logo" class="h-8 w-auto object-contain">
            </div>
            <button class="w-8 h-8 rounded-full bg-white bg-opacity-20 flex items-center justify-center">
                <i class="fas fa-bell text-sm"></i>
            </button>
        </div>
        <h1 class="text-xl font-bold">Naročanje na pregled</h1>
    </header>

            <main class="px-4">

<div class="bg-white rounded-2xl p-5 shadow-sm mb-6 border border-gray-100">
    <p class="text-gray-600 text-sm mb-5">Izberite storitev in termin.</p>

    <div class="space-y-4">
        <div>
            <label class="block text-xs font-medium text-gray-700 mb-1">Vrsta storitve</label>
            <select class="w-full border border-gray-200 rounded-xl p-3 text-sm focus:outline-none focus:border-[#114232] bg-white">
                <option>Splošni pregled</option>
                <option>Posvet za dolgoživost</option>
                <option>Genetsko testiranje</option>
            </select>
        </div>

        <div>
            <label class="block text-xs font-medium text-gray-700 mb-1">Zdravnik</label>
            <select class="w-full border border-gray-200 rounded-xl p-3 text-sm focus:outline-none focus:border-[#114232] bg-white">
                <option>Katerikoli</option>
                <option>Dr. Ariana Vetrovec</option>
                <option>Dr. Marko Horvat</option>
            </select>
        </div>

        <!-- Mobile Calendar widget -->
        <div class="bg-gray-50 p-4 rounded-xl border border-gray-200 mt-4">
            <div class="flex justify-between items-center mb-3">
                <h3 class="text-sm font-semibold text-gray-800">Maj 2024</h3>
                <div class="flex space-x-1">
                    <button class="w-6 h-6 rounded-full bg-white border border-gray-300 flex items-center justify-center"><i class="fas fa-chevron-left text-[10px]"></i></button>
                    <button class="w-6 h-6 rounded-full bg-white border border-gray-300 flex items-center justify-center"><i class="fas fa-chevron-right text-[10px]"></i></button>
                </div>
            </div>

            <div class="grid grid-cols-7 gap-1 text-center mb-2">
                <div class="text-[10px] font-semibold text-gray-500">P</div>
                <div class="text-[10px] font-semibold text-gray-500">T</div>
                <div class="text-[10px] font-semibold text-gray-500">S</div>
                <div class="text-[10px] font-semibold text-gray-500">Č</div>
                <div class="text-[10px] font-semibold text-gray-500">P</div>
                <div class="text-[10px] font-semibold text-gray-500">S</div>
                <div class="text-[10px] font-semibold text-gray-500">N</div>
            </div>

            <!-- Condensed mobile calendar view (showing current week) -->
            <div class="grid grid-cols-7 gap-1 mb-4">
                <div class="h-8 bg-white border border-gray-200 rounded-lg flex items-center justify-center text-xs text-gray-400">13</div>
                <div class="h-8 bg-white border border-gray-200 rounded-lg flex items-center justify-center text-xs">14</div>
                <div class="h-8 bg-[#114232] text-white border border-[#114232] rounded-lg flex items-center justify-center text-xs font-bold shadow-md">15</div>
                <div class="h-8 bg-white border border-gray-200 rounded-lg flex items-center justify-center text-xs relative">16<div class="absolute bottom-0.5 w-1 h-1 rounded-full bg-yellow-400"></div></div>
                <div class="h-8 bg-white border border-gray-200 rounded-lg flex items-center justify-center text-xs">17</div>
                <div class="h-8 bg-gray-100 border border-gray-200 rounded-lg flex items-center justify-center text-xs text-gray-400">18</div>
                <div class="h-8 bg-gray-100 border border-gray-200 rounded-lg flex items-center justify-center text-xs text-gray-400">19</div>
            </div>

            <!-- Timeslots for selected day -->
            <h4 class="text-xs font-semibold text-gray-800 mb-2 border-t border-gray-200 pt-3">Termini za 15. Maj</h4>
            <div class="grid grid-cols-3 gap-2">
                <button class="py-1.5 border-2 border-[#114232] bg-[#114232] text-white rounded-md text-xs font-medium">09:00</button>
                <button class="py-1.5 border border-gray-300 bg-white text-gray-700 rounded-md text-xs font-medium">09:30</button>
                <button class="py-1.5 border border-gray-300 bg-white text-gray-700 rounded-md text-xs font-medium">10:00</button>
                <button class="py-1.5 border border-gray-200 bg-gray-100 text-gray-400 line-through rounded-md text-xs font-medium">10:30</button>
                <button class="py-1.5 border border-gray-300 bg-white text-gray-700 rounded-md text-xs font-medium">11:00</button>
                <button class="py-1.5 border border-gray-300 bg-white text-gray-700 rounded-md text-xs font-medium">13:30</button>
            </div>
        </div>

        <div class="pt-2">
            <label class="block text-xs font-medium text-gray-700 mb-1">Opombe</label>
            <textarea rows="2" class="w-full border border-gray-200 rounded-xl p-3 text-sm focus:outline-none focus:border-[#114232]" placeholder="Dodatne želje..."></textarea>
        </div>

        <button class="bg-[#114232] text-white w-full py-3.5 rounded-xl font-semibold mt-2 shadow-sm">Potrdi rezervacijo</button>
    </div>
</div>

            </main>
        </div>


    <!-- Bottom Navigation -->
    <nav class="absolute bottom-0 w-full bg-white border-t border-gray-200 pb-5 pt-3 px-6 z-40">
        <div class="flex justify-between items-center">

            <a href="domov.html" class="flex flex-col items-center space-y-1 text-gray-400 hover:text-[#114232] transition">
                <i class="fas fa-home text-lg"></i>
                <span class="text-[10px] font-medium">Domov</span>
            </a>

            <a href="narocanje.html" class="flex flex-col items-center space-y-1 text-[#114232] transition">
                <i class="far fa-calendar-alt text-lg"></i>
                <span class="text-[10px] font-medium">Naročanje</span>
            </a>

            <a href="storitve.html" class="flex flex-col items-center space-y-1 text-gray-400 hover:text-[#114232] transition">
                <i class="fas fa-stethoscope text-lg"></i>
                <span class="text-[10px] font-medium">Storitve</span>
            </a>

            <a href="sporocila.html" class="flex flex-col items-center space-y-1 text-gray-400 hover:text-[#114232] transition relative">
                <i class="far fa-envelope text-lg"></i>
                <div class="absolute -top-1 -right-1 w-3 h-3 bg-red-500 rounded-full border-2 border-white"></div>
                <span class="text-[10px] font-medium">Sporočila</span>
            </a>

            <a href="nastavitve.html" class="flex flex-col items-center space-y-1 text-gray-400 hover:text-[#114232] transition">
                <i class="fas fa-user-circle text-lg"></i>
                <span class="text-[10px] font-medium">Profil</span>
            </a>

        </div>
    </nav>

    </div>
</body>
</html>
