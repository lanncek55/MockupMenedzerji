<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic Life - Mobilno</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #e2e8f0; /* Gray bg for desktop to contrast the phone */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* The Phone Mockup Container */
        .phone-mockup {
            width: 375px;
            height: 812px;
            background-color: #f0fdf4;
            border-radius: 40px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 12px solid #1f2937; /* Dark gray "bezels" */
        }

        /* iPhone Notch Mockup */
        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 25px;
            background-color: #1f2937;
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
            z-index: 50;
        }

        /* Inner content area */
        .phone-content {
            height: 100%;
            overflow-y: auto;
            scrollbar-width: none; /* Firefox */
        }
        .phone-content::-webkit-scrollbar {
            display: none; /* Chrome */
        }

        /* Bottom Navigation safe area */
        .bottom-nav-safe {
            padding-bottom: 20px;
        }

        @media (max-width: 400px) {
            body {
                background-color: #f0fdf4;
                display: block;
            }
            .phone-mockup {
                width: 100%;
                height: 100vh;
                border-radius: 0;
                border: none;
                box-shadow: none;
            }
            .notch { display: none; }
        }
    </style>
</head>
<body>
    <div class="phone-mockup">
        <div class="notch"></div>

        <div class="phone-content relative bg-[#f0fdf4] pb-24">

            <!-- Status Bar Placeholder -->
            <div class="h-10 px-6 flex justify-between items-end pb-1 text-xs font-medium z-40 relative text-[#114232]">
                <span>9:41</span>
                <div class="flex space-x-1 items-center">
                    <i class="fas fa-signal text-[10px]"></i>
                    <i class="fas fa-wifi text-[10px]"></i>
                    <i class="fas fa-battery-full text-sm"></i>
                </div>
            </div>

            <!-- Main Content -->

<div class="px-4 pt-2 pb-4 flex items-center relative">
    <h1 class="w-full text-center font-bold text-[#114232] text-lg">Naročanje</h1>
</div>

<div class="px-6 pb-6">
    <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
        <form class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Vrsta storitve</label>
                <select class="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 text-sm focus:outline-none">
                    <option>Splošni pregled</option>
                    <option>Genetski test</option>
                    <option>Posvet</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Izberi datum</label>
                <input type="date" class="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 text-sm focus:outline-none">
            </div>

            <button type="button" class="w-full bg-[#114232] text-white py-3.5 rounded-xl font-bold mt-4">Nadaljuj</button>
        </form>
    </div>
</div>


        </div>


        <!-- Bottom Navigation -->
        <div class="absolute bottom-0 w-full bg-white border-t border-gray-200 px-6 py-2 bottom-nav-safe flex justify-between rounded-b-[28px] z-40">

        <a href="domov.html" class="flex flex-col items-center justify-center w-full text-gray-400">
            <i class="fas fa-home text-xl mb-1"></i>
            <span class="text-[10px]">Domov</span>
        </a>

        <a href="narocanje.html" class="flex flex-col items-center justify-center w-full text-[#114232]">
            <i class="far fa-calendar-alt text-xl mb-1"></i>
            <span class="text-[10px]">Naročanje</span>
        </a>

        <a href="sporocila.html" class="flex flex-col items-center justify-center w-full text-gray-400">
            <i class="far fa-envelope text-xl mb-1"></i>
            <span class="text-[10px]">Sporočila</span>
        </a>

        <a href="nastavitve.html" class="flex flex-col items-center justify-center w-full text-gray-400">
            <i class="fas fa-cog text-xl mb-1"></i>
            <span class="text-[10px]">Nastavitve</span>
        </a>

        </div>

    </div>
</body>
</html>
